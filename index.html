<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>
			Do I need an MDM?
		</title>
		<style>
		@media (prefers-color-scheme: dark) {
		html {
			background-color: #000000; 
		}
		h1,h2,a {
			color: white;
		}
		}
		@media (prefers-color-scheme: light) {
		html {
			background-color: #ffffff; 
		}
		h1,h2,a {
			color: black;
		}
		}
		html, body {
			height: 100%;
			margin: 0;
			overflow: hidden;
		}

		h1 {
			position: fixed;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			text-align: center;
			font-family: Gotham, "Helvetica Neue", Helvetica, Arial, "sans-serif";
			font-size: 2000%;
			margin: 0;
		}
		h2,a {
		text-align: center;
		font-family: Gotham, "Helvetica Neue", Helvetica, Arial, "sans-serif";
		font-size: 100%;
		}
		#mdmContainer {
			position: fixed;
			left: 0;
			right: 0;
			bottom: 0;
			width: 100%;
			margin: 0;
			padding: 0.5rem 0;
			z-index: 10;
		}
		#mdmContainer a { display: inline-block; }
		</style>
	</head>
	<body>
		<h1>
			YES.
		</h1>
		<h2 id='mdmContainer'>
			Like this one maybe:
		</h2>
		<script>
		// I actually had ChatGPT generate this Javascript for me. All I had to add was the DOM bit to append it to the right place.
		var urls = {
		"Mosyle": "https://mosyle.com",
		"SimpleMDM": "https://simplemdm.com",
		"Jamf": "https://jamf.com",
		"Iru": "https://www.iru.com/products/endpoint/endpoint-management/",
		"Hexnode": "https://hexnode.com",
		"Workspace One": "https://www.omnissa.com/products/workspace-one-unified-endpoint-management/",
		"Microsoft Intune": "https://learn.microsoft.com/en-us/mem/intune/fundamentals/what-is-intune",
		"MaaS360": "https://www.ibm.com/products/maas360",
		"Addigy": "https://addigy.com",
		"Apple Business Essentials": "https://www.apple.com/business/essentials/",
		"ScaleFusion": "https://scalefusion.com/apple-device-management",
		"JumpCloud": "https://jumpcloud.com/platform/mdm",
		"Fleet": "https://fleetdm.com/",
		"Bravas": "https://www.bravas.io",
		"NinjaOne": "https://www.ninjaone.com/mdm/"
		};

		var randomUrl = Object.keys(urls)[Math.floor(Math.random() * Object.keys(urls).length)];
		var link = urls[randomUrl];

		var a = document.createElement("a");
		a.href = link;
		a.innerHTML = randomUrl;
		var element = document.getElementById("mdmContainer");
		element.appendChild(a);
		</script>
	</body>
</html>
